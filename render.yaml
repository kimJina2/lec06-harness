services:
  - type: web
    name: lec06-harness
    runtime: python
    rootDir: app
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
