services:
  - type: web
    name: lec06-harness
    runtime: python
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r app/requirements.txt
    startCommand: cd app && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
